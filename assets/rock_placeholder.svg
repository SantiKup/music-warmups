<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="120" width="1360" height="760" rx="28" fill="#ffffff" stroke="#111827" stroke-opacity="0.10"/>
  </g>

  <rect x="120" y="120" width="1360" height="92" rx="28" fill="url(#ribbon)" opacity="0.92"/>
  <text x="160" y="180" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="34" font-weight="700" fill="#ffffff">BandJam Placeholder Warm-Up</text>

  <!-- Staff lines -->
  <g stroke="#111827" stroke-opacity="0.22" stroke-width="4">
    <line x1="200" y1="320" x2="1400" y2="320"/>
    <line x1="200" y1="356" x2="1400" y2="356"/>
    <line x1="200" y1="392" x2="1400" y2="392"/>
    <line x1="200" y1="428" x2="1400" y2="428"/>
    <line x1="200" y1="464" x2="1400" y2="464"/>

    <line x1="200" y1="580" x2="1400" y2="580"/>
    <line x1="200" y1="616" x2="1400" y2="616"/>
    <line x1="200" y1="652" x2="1400" y2="652"/>
    <line x1="200" y1="688" x2="1400" y2="688"/>
    <line x1="200" y1="724" x2="1400" y2="724"/>
  </g>

  <text x="200" y="260" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="22" font-weight="650" fill="#111827" opacity="0.85">
    Replace with your real sheet image in /assets and update script.js mapping.
  </text>

  <text x="200" y="820" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="18" fill="#6b7280">
    File: assets/rock_placeholder.svg
  </text>
</svg>

